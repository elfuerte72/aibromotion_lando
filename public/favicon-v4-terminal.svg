<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Концепт 4: Terminal Cursor — блок-курсор в рамке терминала -->
  <rect width="48" height="48" rx="10" fill="#252525"/>
  <!-- Terminal window dots -->
  <circle cx="12" cy="10" r="2" fill="#e8a898" opacity="0.5"/>
  <circle cx="19" cy="10" r="2" fill="#e8a898" opacity="0.3"/>
  <circle cx="26" cy="10" r="2" fill="#e8a898" opacity="0.2"/>
  <!-- Prompt symbol > -->
  <path d="M10 23L18 28L10 33" stroke="#e8a898" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- Cursor block -->
  <rect x="22" y="24" width="10" height="14" rx="1" fill="#e8a898"/>
</svg>
