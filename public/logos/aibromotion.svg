<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" preserveAspectRatio="xMidYMid meet" role="img" aria-label="AIBROMOTION — AI · Video · Marketing · Automation">
  <!-- No background — fully transparent so the logo blends with any surface. -->

  <!-- "ai" — dark charcoal, heavy weight -->
  <text x="60" y="238"
        font-family="'Arial Black', 'Helvetica Inserat', 'Franklin Gothic Heavy', 'Haettenschweiler', 'Inter Tight', system-ui, sans-serif"
        font-size="200" font-weight="900" fill="#2B2A2C" letter-spacing="-8">ai</text>

  <!-- Subtle vertical hairline between "ai" and "bro" — matches source -->
  <rect x="258" y="58" width="4" height="185" fill="#2B2A2C" opacity="0.15"/>

  <!-- "bro" — brand red, dominant mass -->
  <text x="270" y="238"
        font-family="'Arial Black', 'Helvetica Inserat', 'Franklin Gothic Heavy', 'Haettenschweiler', 'Inter Tight', system-ui, sans-serif"
        font-size="200" font-weight="900" fill="#B0413E" letter-spacing="-8">bro</text>

  <!-- Red underline bar beneath "ai" -->
  <rect x="60" y="258" width="196" height="16" fill="#B0413E" rx="1"/>

  <!-- Small dark square separator between the red bar and "MOTION" -->
  <rect x="258" y="258" width="16" height="16" fill="#2B2A2C"/>

  <!-- "MOTION" — dark, bold caps -->
  <text x="284" y="274"
        font-family="'Arial Black', 'Helvetica Inserat', 'Franklin Gothic Heavy', 'Haettenschweiler', 'Inter Tight', system-ui, sans-serif"
        font-size="58" font-weight="900" fill="#2B2A2C" letter-spacing="6">MOTION</text>

  <!-- Tagline — thin, letter-spaced. Sized so it stays legible when the
       full lockup is rendered at 120–180px tall in the hero. -->
  <text x="60" y="338"
        font-family="'Arial', 'Helvetica Neue', 'Inter Tight', system-ui, sans-serif"
        font-size="28" font-weight="600" fill="#B0413E" letter-spacing="6">AI  ·  VIDEO  ·  MARKETING  ·  AUTOMATION</text>

  <!-- Bottom hairline rule -->
  <line x1="60" y1="368" x2="840" y2="368" stroke="#2B2A2C" stroke-width="1.4"/>
</svg>
